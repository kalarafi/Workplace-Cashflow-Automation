name: Daily Cash Flow Processing
on:
  schedule:
    - cron: '0 9 * * *'  # Run daily at 9 AM
jobs:
  process-cashflow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - run: pip install -r requirements.txt
      - run: python main.py
      - uses: actions/upload-artifact@v2
        with:
          name: reports
          path: reports/